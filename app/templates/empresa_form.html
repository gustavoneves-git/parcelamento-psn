{% extends "base.html" %}

{% block content %}
<section class="page-title">
    <div>
        <h1>{{ titulo }}</h1>
        <p>Configure a empresa e a pasta onde a guia deve aparecer para o Onvio.</p>
    </div>
    <a class="button" href="{{ url_for('empresas.index') }}">Voltar</a>
</section>

<form class="panel form-grid" method="post">
    <label>
        CNPJ
        <input name="cnpj" value="{{ empresa.cnpj or '' }}" required>
    </label>
    <label>
        Nome da empresa
        <input name="nome_empresa" value="{{ empresa.nome_empresa or '' }}" required>
    </label>
    <label>
        Identificador Onvio
        <input name="nome_onvio" value="{{ empresa.nome_onvio or '' }}" placeholder="Ex: 165, se precisar">
    </label>
    <label>
        Status
        <select name="status_empresa">
            <option value="ATIVA" {% if (empresa.status_empresa or 'ATIVA') == 'ATIVA' %}selected{% endif %}>ATIVA</option>
            <option value="INATIVA" {% if empresa.status_empresa == 'INATIVA' %}selected{% endif %}>INATIVA</option>
        </select>
    </label>
    <label class="full">
        Pasta Onvio
        <input name="pasta_onvio" value="{{ empresa.pasta_onvio or '' }}" placeholder="Ex: C:\Onvio\Clientes\Empresa\Guias">
    </label>
    <label class="full">
        Observacao
        <textarea name="observacao" rows="4">{{ empresa.observacao or '' }}</textarea>
    </label>
    <div class="form-actions full">
        <button class="button primary" type="submit">Salvar</button>
    </div>
</form>
{% endblock %}
