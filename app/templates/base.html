<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consiste PSN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('empresas.index') }}">
            <img src="{{ url_for('static', filename='img/consiste-logo.svg') }}" alt="Consiste">
        </a>
        <nav>
            <a href="{{ url_for('empresas.index') }}">Empresas</a>
            <a href="{{ url_for('historico.mensal') }}">Historico mensal</a>
        </nav>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="messages">
                    {% for category, message in messages %}
                        <div class="message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
