<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-labelledby="title desc">
  <title id="title">Consiste</title>
  <desc id="desc">Logomarca Consiste Auditoria, Consultoria e Contabilidade</desc>
  <defs>
    <linearGradient id="barA" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#1ec8ed"/>
      <stop offset="1" stop-color="#007fc7"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#0b6fbd"/>
      <stop offset="1" stop-color="#074489"/>
